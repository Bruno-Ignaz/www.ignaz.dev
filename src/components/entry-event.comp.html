<div class="entry group bg-surface-container-lowest dark:bg-[#1d2226] p-6 rounded-xl flex flex-col md:flex-row items-start md:items-center justify-between gap-6 hover:translate-x-1 transition-all duration-300 editorial-shadow border border-transparent hover:border-outline-variant/10 dark:hover:border-[#404a50]/10" data-type="events" data-title="{{ title }}">
<div class="flex items-center gap-6">
<div class="w-14 h-14 rounded-xl bg-secondary-container/40 dark:bg-[#404a50]/40 flex items-center justify-center text-secondary-dim dark:text-[#a8b0b6] group-hover:scale-105 transition-transform">
<span class="material-symbols-outlined !text-3xl">{{ icon }}</span>
</div>
<div>
<h3 class="font-headline font-bold text-lg text-on-surface dark:text-[#e3e6e8] tracking-tight">{{ title }}</h3>
<p class="text-on-surface-variant dark:text-[#a8b0b6] font-body text-sm mt-0.5">{{ description }}</p>
</div>
</div>
<div class="flex items-center gap-4 w-full md:w-auto justify-end">
<span class="text-xs font-label font-medium text-outline dark:text-[#858f95] uppercase tracking-wider">{{ meta }}</span>
<a href="{{ actionHref }}" class="flex items-center gap-2 px-5 py-2.5 border border-outline-variant/30 dark:border-[#404a50]/30 text-on-surface dark:text-[#e3e6e8] text-xs font-bold uppercase tracking-widest rounded-md hover:bg-surface-container-low dark:hover:bg-[#242a2e] transition-colors">
<span class="material-symbols-outlined !text-sm">event_available</span>
{{ actionText }}
</a>
</div>
</div>
